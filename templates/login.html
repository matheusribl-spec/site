<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Mandato</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-light mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">Mandato</a>
  </div>
</nav>

<div class="container">
  <div class="card p-4" style="max-width:480px;margin:0 auto;">
    <h4>Entrar</h4>
    <p class="small text-muted">Use seu email e senha para acessar o painel.</p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="Senha">
      </div>
      <div class="d-flex justify-content-between">
        <a href="/" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
    </form>
    <div class="mt-3 small">Ainda não tem conta? <a href="{{ url_for('register') }}">Cadastre-se</a></div>
  </div>
</div>

</body>
</html>
